{% extends 'base.html' %}
{% load static %}

{% block title %}Password Changed | ClassADDA{% endblock %}

{% block content %}
<section class="ca-auth-section">
    <div class="container ca-shell">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <div class="ca-auth-card text-center">
                    <img src="{% static 'img/iubat-logo.png' %}" alt="ClassADDA Logo" class="ca-login-logo mb-3">

                    <h2 class="h3 mb-2">Password changed successfully</h2>

                    <p class="text-muted mb-4">
                        You can now log in with your new password.
                    </p>

                    <a href="{% url 'accounts:login' %}" class="btn btn-ca-gold">
                        Login to ClassADDA
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
